name: Generate PDFs

on:
  push:
    paths:
      - "public/src/**/*.md"
      - ".github/workflows/generate-pdfs.yml"
      - "index.js"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdfs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gather changed markdown files
        id: changed
        run: |
          set -e

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            find public/src -type f -name "*.md" | sort > changed_files.txt
          else
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"

            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              git ls-tree -r --name-only "$AFTER_SHA" -- public/src | grep -E '\.md$' | sort > changed_files.txt || true
            else
              git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- public/src | grep -E '\.md$' | sort > changed_files.txt || true
            fi
          fi

          echo "Changed markdown files:"
          cat changed_files.txt || true

          if [ -s changed_files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate PDFs for changed files
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set -e
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ ! -f "$file" ]; then
              echo "Skipping missing file: $file"
              continue
            fi
            base_name="$(basename "$file" .md)"
            echo "Generating PDF for $file"
            node index.js public "$base_name"
          done < changed_files.txt

      - name: Commit updated PDFs
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set -e

          if git diff --quiet -- public/pdf; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/pdf
          git commit -m "chore: regenerate PDFs from updated markdown"
          git push
