name: Sync PDFs to website

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Generate PDFs"]
    types: [completed]
    branches: [main]

jobs:
  sync-pdfs:
    # Only run if the PDF generation workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2  # need 2 commits to diff and find what PDFs changed

      - name: Find changed PDFs
        id: changed
        run: |
          # Diff the last two commits, filter to PDFs only
          git diff --name-only HEAD~1 HEAD -- public/pdf > changed_pdfs.txt
          echo "Changed PDFs:"
          cat changed_pdfs.txt

          if [ -s changed_pdfs.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No PDF changes detected, skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout website repo
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: Speedcubing-Canada/speedcubing-canada-web
          path: website
          token: ${{ secrets.BOT_PAT }}

      - name: Copy PDFs and create versioned copies for policies
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          dest="website/front/public/documents"
          mkdir -p "$dest"

          is_versioned_doc() {
            local id="$1"
            if echo "$id" | grep -qE '^(directors-meeting|annual-members-meeting|first-members-meeting|first-directors-meeting|certificate-)'; then
              return 1
            fi
            return 0
          }

          while IFS= read -r pdf; do
            [ -z "$pdf" ] && continue
            filename="$(basename "$pdf" .pdf)"

            echo "Copying $filename.pdf"
            cp "$pdf" "$dest/$filename.pdf"

            if ! is_versioned_doc "$filename"; then
              echo "  → Minutes/corporate doc, skipping version lookup"
              continue
            fi

            md_file=$(find public/src -name "${filename}.md" | head -1)

            if [ -f "$md_file" ]; then
              version=$(head -20 "$md_file" | grep -iE '^version:\s*[0-9]+\.[0-9]+' | head -1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' || true)
              if [ -n "$version" ]; then
                versioned_name="${filename}-v${version}"
                echo "  → Copying as $versioned_name.pdf"
                cp "$pdf" "$dest/$versioned_name.pdf"
                echo "$versioned_name" >> versioned_pdfs.txt
              else
                echo "  → No version found, skipping versioned copy"
              fi
            else
              echo "  → No matching MD file found for $filename"
            fi
          done < changed_pdfs.txt

      - name: Add missing entries to documents.ts
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          echo "=== versioned_pdfs.txt ===" 
          cat versioned_pdfs.txt 2>/dev/null || echo "FILE NOT FOUND"
          echo "=== changed_pdfs.txt ==="
          cat changed_pdfs.txt 2>/dev/null || echo "FILE NOT FOUND"
          
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const DOCS_FILE = 'website/front/src/pages/documents.ts';
          let content = fs.readFileSync(DOCS_FILE, 'utf8');

          const changedPdfs = fs.readFileSync('changed_pdfs.txt', 'utf8')
            .split('\n').map(l => l.trim()).filter(Boolean)
            .map(p => path.basename(p, '.pdf'));

          const versionedPdfs = fs.existsSync('versioned_pdfs.txt')
            ? fs.readFileSync('versioned_pdfs.txt', 'utf8')
                .split('\n').map(l => l.trim()).filter(Boolean)
            : [];

          function alreadyExists(id) {
            return content.includes(`"${id}"`);
          }

          function categorize(id) {
            if (/^(directors-meeting|annual-members-meeting|first-members-meeting|first-directors-meeting)/.test(id))
              return 'minutes';
            if (/^by-laws/.test(id)) return 'byLaws';
            if (/^certificate-/.test(id)) return 'corporate';
            return 'policies';
          }

          // Human name: "by-laws-v1.5" -> "By-laws (v1.5)"
          function humanName(id) {
            const versionMatch = id.match(/^(.+)-v(\d+\.\d+(?:\.\d+)?)$/);
            if (versionMatch) {
              const baseId = versionMatch[1];
              const version = versionMatch[2];
              const baseNameMatch = content.match(new RegExp(`name:\\s*"([^"]+)",\\s*\\n?\\s*id:\\s*"${baseId}"`));
              if (baseNameMatch) {
                return `${baseNameMatch[1]} (v${version})`;
              }
              // Fallback: capitalize words
              return id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }
            // Non-versioned: capitalize words
            return id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
          }

          function insertAfterPattern(pattern, newEntry) {
            const idx = content.lastIndexOf(pattern);
            if (idx === -1) return false;
            // Find the end of this entry's closing },
            const afterIdx = content.indexOf('},', idx);
            if (afterIdx === -1) return false;
            const insertAt = afterIdx + 2; // after the },
            content = content.slice(0, insertAt) + '\n' + newEntry + content.slice(insertAt);
            return true;
          }

          function insertAtTopOfSection(section, newEntry) {
            // Find the section array opening bracket
            const pattern = `  ${section}: [`;
            const idx = content.indexOf(pattern);
            if (idx === -1) return false;
            const bracketIdx = content.indexOf('[', idx);
            const insertAt = bracketIdx + 1;
            content = content.slice(0, insertAt) + '\n' + newEntry + content.slice(insertAt);
            return true;
          }

          function insertAtBottomOfSection(section, newEntry) {
            // Find the closing ], of the section
            const pattern = `  ${section}: [`;
            const idx = content.indexOf(pattern);
            if (idx === -1) return false;
            // Find the closing ], after this section start
            const closingIdx = content.indexOf('  ],', idx);
            if (closingIdx === -1) return false;
            content = content.slice(0, closingIdx) + newEntry + '\n' + content.slice(closingIdx);
            return true;
          }

          function formatSingleLine(id, name) {
            return `    { name: "${name}", id: "${id}" },`;
          }

          function formatMultiLine(id, name) {
            return `    {\n      name: "${name}",\n      id: "${id}",\n    },`;
          }

          // --- Process main (unversioned) changed PDFs ---
          for (const id of changedPdfs) {
            if (alreadyExists(id)) {
              console.log(`✓ ${id} already exists (updated in place)`);
              continue;
            }

            const category = categorize(id);
            const name = humanName(id);
            console.log(`✗ ${id} missing — adding to '${category}'`);

            if (category === 'minutes') {
              // New minutes go at the top
              insertAtTopOfSection('minutes', formatMultiLine(id, name));
            } else if (category === 'byLaws') {
              // New by-laws version goes at the bottom (current file already overwritten)
              insertAtBottomOfSection('byLaws', formatSingleLine(id, name));
            } else if (category === 'corporate') {
              insertAtBottomOfSection('corporate', formatMultiLine(id, name));
            } else {
              // New policy: insert current entry at TOP of policies
              insertAtTopOfSection('policies', formatMultiLine(id, name));
            }
          }

          // --- Process versioned PDFs ---
          for (const id of versionedPdfs) {
            if (alreadyExists(id)) {
              console.log(`✓ ${id} already exists, skipping`);
              continue;
            }

            const category = categorize(id);
            const name = humanName(id);
            console.log(`✗ ${id} missing — inserting versioned entry`);

            const baseId = id.replace(/-v\d+\.\d+(?:\.\d+)?$/, '');

            if (category === 'byLaws') {
              insertAtBottomOfSection('byLaws', formatSingleLine(id, name));
            } else {
              // Find the last versioned sibling: look for baseId-vX.Y pattern specifically
              const versionedSiblingRegex = new RegExp(`"${baseId}-v\\d+\\.\\d+`, 'g');
              let lastMatch = null;
              let match;
              while ((match = versionedSiblingRegex.exec(content)) !== null) {
                lastMatch = match;
              }

              if (lastMatch) {
                // Insert after the last versioned sibling entry
                insertAfterPattern(lastMatch[0], formatSingleLine(id, name));
              } else {
                // No versioned siblings yet — insert at bottom of section
                insertAtBottomOfSection(category, formatSingleLine(id, name));
              }
            }
          }

          fs.writeFileSync(DOCS_FILE, content);
          console.log('documents.ts updated successfully');
          EOF

          # Format the file to match repo conventions
          cd website
          npx prettier --write front/src/pages/documents.ts

      - name: Build PR metadata
        if: steps.changed.outputs.has_changes == 'true'
        id: pr_meta
        run: |
          # Who triggered the original push to the docs repo
          ACTOR="${{ github.event.workflow_run.triggering_actor.login }}"
          PR_DATE=$(TZ="America/Toronto" date +'%b %-d %Y')

          NEW_DOCS=""
          UPDATED_DOCS=""
          NEW_VERSIONS=""

          while IFS= read -r pdf; do
            [ -z "$pdf" ] && continue
            filename="$(basename "$pdf" .pdf)"
            if git -C website log --oneline -- "front/public/documents/${filename}.pdf" 2>/dev/null | grep -q .; then
              UPDATED_DOCS="${UPDATED_DOCS}- \`${filename}\` (updated)\n"
            else
              NEW_DOCS="${NEW_DOCS}- \`${filename}\` (new document)\n"
            fi
          done < changed_pdfs.txt

          if [ -f versioned_pdfs.txt ]; then
            while IFS= read -r versioned; do
              [ -z "$versioned" ] && continue
              NEW_VERSIONS="${NEW_VERSIONS}- \`${versioned}\`\n"
            done < versioned_pdfs.txt
          fi

          > pr_changes.txt
          if [ -n "$NEW_DOCS" ]; then
            printf "### New documents\n" >> pr_changes.txt
            printf "%b" "$NEW_DOCS" >> pr_changes.txt
            printf "\n" >> pr_changes.txt
          fi
          if [ -n "$UPDATED_DOCS" ]; then
            printf "### Updated documents\n" >> pr_changes.txt
            printf "%b" "$UPDATED_DOCS" >> pr_changes.txt
            printf "\n" >> pr_changes.txt
          fi
          if [ -n "$NEW_VERSIONS" ]; then
            printf "### New versioned copies added\n" >> pr_changes.txt
            printf "%b" "$NEW_VERSIONS" >> pr_changes.txt
            printf "\n" >> pr_changes.txt
          fi

          {
            echo "ACTOR=${ACTOR}"
            echo "PR_DATE=${PR_DATE}"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR on website repo
        if: steps.changed.outputs.has_changes == 'true'
        working-directory: website
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          git config user.name "SpeedcubingCanada-bot"
          git config user.email "software@speedcubingcanada.org"

          BRANCH="automated/sync-pdfs-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add front/public/documents front/src/pages/documents.ts

          if git diff --staged --quiet; then
            echo "Nothing changed in website repo, skipping PR."
            exit 0
          fi

          CHANGES=$(cat ../pr_changes.txt)
          ACTOR="${{ steps.pr_meta.outputs.ACTOR }}"
          PR_DATE="${{ steps.pr_meta.outputs.PR_DATE }}"

          git commit -m "chore: sync documents – ${PR_DATE}"
          git push origin "$BRANCH"

          gh pr create \
            --repo Speedcubing-Canada/speedcubing-canada-web \
            --title "docs: update documents (${PR_DATE})" \
            --body "## Document sync

          Triggered by @${ACTOR} via [docs-speedcubing-canada](https://github.com/Speedcubing-Canada/docs-speedcubing-canada).

          ${CHANGES}
          ---
          > New documents have been inserted into \`documents.ts\` automatically. Please verify categories and ordering before merging." \
            --base main